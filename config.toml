# Obsidian Host Configuration

[server]
# The host address to bind to (default: 127.0.0.1)
host = "127.0.0.1"

# The port to listen on (default: 8080)
port = 8080

[database]
# Path to the SQLite database file (default: ./obsidian-host.db)
path = "./obsidian-host.db"

[vault]
# Base directory where newly created vaults are stored when no explicit path is provided.
# The UI creates vaults under this directory using the vault name.
base_dir = "./vaults"

# List of patterns to exclude from search indexing and file watcher
# Default includes: .git, .obsidian, .trash, node_modules
index_exclusions = [".git", ".obsidian", ".trash", "node_modules", "target"]

[auth]
# Authentication toggle and token settings
enabled = false
# Current provider options: "password" (implemented), "oidc" (planned), "mtls" (planned)
provider = "password"
jwt_secret = ""
access_token_ttl = 3600
refresh_token_ttl = 604800

# Step 35 bootstrap admin (used only when users table is empty)
# Set these before first run to create the initial admin account.
bootstrap_admin_username = ""
bootstrap_admin_password = ""

[sync]
# Keep file change log entries for this many days (used by /api/vaults/{vault_id}/changes)
change_log_retention_days = 7

[cors]
# Allowed browser origins for API requests
allowed_origins = ["http://localhost:5173"]

[storage]
# Storage backend: "local" (implemented), "s3" (scaffolded)
backend = "local"

[storage.s3]
# Optional S3/MinIO settings (used when storage.backend = "s3")
endpoint = ""
bucket = ""
region = ""
access_key = ""
secret_key = ""
path_style = true
